<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#111;
transition:background 0.8s ease;
color:white;
}

.player{
width:95%;
max-width:420px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(20px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.title{
font-size:24px;
margin-bottom:5px;
}

.subtitle{
color:#ccc;
margin-bottom:20px;
font-size:14px;
}

.carousel{
overflow:hidden;
width:100%;
margin-bottom:20px;
}

.carousel-track{
display:flex;
transition:transform .6s cubic-bezier(.22,1,.36,1);
}

.album{
min-width:130px;
margin:0 12px;
transform:scale(.75);
opacity:.5;
transition:all .5s;
}

.album img{
width:130px;
height:130px;
border-radius:20px;
object-fit:cover;
}

.album.active{
transform:scale(1);
opacity:1;
}

.song{
font-size:20px;
margin-top:10px;
}

.artist{
color:#ccc;
margin-bottom:15px;
}

.progress-container{
display:flex;
align-items:center;
gap:10px;
}

.progress{
flex:1;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#ff9500;
}

.controls{
margin-top:20px;
display:flex;
justify-content:center;
gap:40px;
}

button{
background:none;
border:none;
color:white;
font-size:28px;
cursor:pointer;
}

.play{
background:#ff9500;
border-radius:10px;
padding:10px 16px;
font-size:20px;
}

</style>
</head>


<body>

<div class="player">

<div class="title">Playlist</div>
<div class="subtitle">Songs that remind me of you</div>

<div class="carousel">
<div class="carousel-track" id="track"></div>
</div>

<div class="song" id="song">Song</div>
<div class="artist" id="artist">Artist</div>

<div class="progress-container">
<span id="current">0:00</span>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<span id="duration">0:00</span>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button class="play" onclick="togglePlay()" id="play">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<audio id="audio"></audio>

</div>

<script>

const songs=[

{
title:"About You",
artist:"The 1975",
cover:"https://i.scdn.co/image/ab67616d0000b273aee0f7b24c01b78a8b7e6a8c",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},

{
title:"Song Two",
artist:"Artist",
cover:"https://picsum.photos/300?1",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},

{
title:"Song Three",
artist:"Artist",
cover:"https://picsum.photos/300?2",
src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
}

]

let index=0

const track=document.getElementById("track")
const audio=document.getElementById("audio")
const playBtn=document.getElementById("play")

const songTitle=document.getElementById("song")
const artist=document.getElementById("artist")

const progress=document.getElementById("progress")
const current=document.getElementById("current")
const duration=document.getElementById("duration")

function buildCarousel(){

track.innerHTML=""

songs.forEach((s)=>{
let div=document.createElement("div")
div.className="album"
div.innerHTML=`<img src="${s.cover}">`
track.appendChild(div)
})

}

buildCarousel()

function loadSong(){

let song=songs[index]

audio.src=song.src
songTitle.textContent=song.title
artist.textContent=song.artist

updateCarousel()
updateBackground(song.cover)

}

function updateCarousel(){

const albums=document.querySelectorAll(".album")

albums.forEach(a=>a.classList.remove("active"))

albums[index].classList.add("active")

let offset=(index*154)

track.style.transform=`translateX(${ -offset +120 }px)`

}

function nextSong(){

index++

if(index>=songs.length){
index=0
}

loadSong()
audio.play()
playBtn.textContent="⏸"

}

function prevSong(){

index--

if(index<0){
index=songs.length-1
}

loadSong()
audio.play()
playBtn.textContent="⏸"

}

function togglePlay(){

if(audio.paused){
audio.play()
playBtn.textContent="⏸"
}else{
audio.pause()
playBtn.textContent="▶"
}

}

audio.addEventListener("timeupdate",()=>{

let percent=(audio.currentTime/audio.duration)*100
progress.style.width=percent+"%"

current.textContent=formatTime(audio.currentTime)
duration.textContent=formatTime(audio.duration)

})

function formatTime(t){

let m=Math.floor(t/60)
let s=Math.floor(t%60)

if(s<10) s="0"+s

return m+":"+s

}

function updateBackground(img){

let image=new Image()
image.crossOrigin="anonymous"
image.src=img

image.onload=function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=image.width
canvas.height=image.height

ctx.drawImage(image,0,0)

let data=ctx.getImageData(0,0,canvas.width,canvas.height).data

let r=0,g=0,b=0,count=0

for(let i=0;i<data.length;i+=40){
r+=data[i]
g+=data[i+1]
b+=data[i+2]
count++
}

r=Math.floor(r/count)
g=Math.floor(g/count)
b=Math.floor(b/count)

document.body.style.background=`linear-gradient(135deg,rgb(${r},${g},${b}),#000)`

}

}

loadSong()

</script>

</body>
</html>
